AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  HRRR wind/current backend for Mojo. Creates storage, a container-image ingest Lambda,
  a zip-based API Lambda, a Function URL, and a scheduled ingest trigger.

Parameters:
  ProjectName:
    Type: String
    Default: mojo-weather
  ProcessedBucketName:
    Type: String
    Default: ''
    Description: Optional explicit S3 bucket name for processed weather grids.
  IngestImageUri:
    Type: String
    Description: ECR image URI for the ingest Lambda container image.
  ApiCodeS3Bucket:
    Type: String
    Default: ''
    Description: Optional S3 bucket for api lambda zip. Leave blank to use inline ZipFile.
  ApiCodeS3Key:
    Type: String
    Default: ''
    Description: Optional S3 key for api lambda zip.
  PublicApiCorsAllowOrigin:
    Type: String
    Default: '*'
  DefaultBBox:
    Type: String
    Default: '-123.40,47.20,-122.00,48.10'
    Description: minLon,minLat,maxLon,maxLat for default processing region.
  DefaultRows:
    Type: Number
    Default: 80
  DefaultCols:
    Type: Number
    Default: 120
  DefaultHorizonHours:
    Type: Number
    Default: 18
  EnableCurrentScaffold:
    Type: String
    AllowedValues: ['true','false']
    Default: 'true'

Conditions:
  HasExplicitBucketName: !Not [!Equals [!Ref ProcessedBucketName, '']]
  UseInlineApiCode: !Equals [!Ref ApiCodeS3Bucket, '']

Resources:
  ProcessedWeatherBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasExplicitBucketName, !Ref ProcessedBucketName, !Ref 'AWS::NoValue']
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldForecasts
            Status: Enabled
            ExpirationInDays: 14

  IngestLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ProcessedBucketWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ProcessedWeatherBucket.Arn
                  - !Sub '${ProcessedWeatherBucket.Arn}/*'

  ApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ProcessedBucketRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ProcessedWeatherBucket.Arn
                  - !Sub '${ProcessedWeatherBucket.Arn}/*'

  IngestLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-ingest'
      PackageType: Image
      Role: !GetAtt IngestLambdaRole.Arn
      Code:
        ImageUri: !Ref IngestImageUri
      Timeout: 900
      MemorySize: 3008
      Architectures:
        - x86_64
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref ProcessedWeatherBucket
          DEFAULT_BBOX: !Ref DefaultBBox
          DEFAULT_ROWS: !Sub '${DefaultRows}'
          DEFAULT_COLS: !Sub '${DefaultCols}'
          DEFAULT_HORIZON_HOURS: !Sub '${DefaultHorizonHours}'
          ENABLE_CURRENT_SCAFFOLD: !Ref EnableCurrentScaffold
          NOAA_HRRR_BUCKET: noaa-hrrr-pds
          NOAA_HRRR_REGION: us-east-1
          HRRR_DOMAIN: conus
          MODEL_NAME: HRRR

  ApiLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-api'
      PackageType: Zip
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ApiLambdaRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref ProcessedWeatherBucket
          CORS_ALLOW_ORIGIN: !Ref PublicApiCorsAllowOrigin
      Code:
        ZipFile: |
          import boto3, json, os
          s3 = boto3.client('s3')
          BUCKET = os.environ['OUTPUT_BUCKET']
          CORS = os.environ.get('CORS_ALLOW_ORIGIN', '*')

          def response(code, body, content_type='application/json'):
              return {
                  'statusCode': code,
                  'headers': {
                      'Content-Type': content_type,
                      'Access-Control-Allow-Origin': CORS,
                      'Access-Control-Allow-Methods': 'GET,OPTIONS',
                      'Access-Control-Allow-Headers': 'content-type'
                  },
                  'body': body if isinstance(body, str) else json.dumps(body)
              }

          def latest_key(prefix):
              resp = s3.list_objects_v2(Bucket=BUCKET, Prefix=prefix)
              keys = [o['Key'] for o in resp.get('Contents', []) if o['Key'].endswith('.json')]
              return sorted(keys)[-1] if keys else None

          def get_json(key):
              obj = s3.get_object(Bucket=BUCKET, Key=key)
              return json.loads(obj['Body'].read())

          def handler(event, context):
              method = (event.get('requestContext', {}).get('http', {}).get('method')
                        or event.get('httpMethod') or 'GET')
              if method == 'OPTIONS':
                  return response(200, '')
              path = event.get('rawPath') or event.get('path') or '/'
              qs = event.get('queryStringParameters') or {}
              if path == '/health':
                  return response(200, {'ok': True, 'bucket': BUCKET})
              if path == '/latest':
                  weather_type = qs.get('type', 'wind')
                  key = latest_key(f'processed/{weather_type}/')
                  if not key:
                      return response(404, {'error': 'No processed files found'})
                  return response(200, {'key': key, 'document': get_json(key)})
              if path == '/field':
                  weather_type = qs.get('type', 'wind')
                  valid = qs.get('valid')
                  key = qs.get('key')
                  if not key and valid:
                      key = f'processed/{weather_type}/{valid}.json'
                  if not key:
                      return response(400, {'error': 'Provide valid or key'})
                  try:
                      return response(200, get_json(key))
                  except Exception as e:
                      return response(404, {'error': str(e), 'key': key})
              return response(404, {'error': 'Not found'})

  ApiFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt ApiLambda.Arn
      AuthType: NONE
      Cors:
        AllowOrigins:
          - !Ref PublicApiCorsAllowOrigin
        AllowMethods:
          - GET
        AllowHeaders:
          - content-type

  ApiFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiLambda
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  IngestScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Run HRRR ingest every hour.
      ScheduleExpression: rate(1 hour)
      State: ENABLED
      Targets:
        - Arn: !GetAtt IngestLambda.Arn
          Id: IngestLambdaTarget
          Input: !Sub |
            {
              "weather_types": ["wind", "current"],
              "bbox": "${DefaultBBox}",
              "rows": ${DefaultRows},
              "cols": ${DefaultCols},
              "horizon_hours": ${DefaultHorizonHours}
            }

  AllowEventBridgeInvokeIngest:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IngestLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt IngestScheduleRule.Arn

Outputs:
  ProcessedBucketName:
    Value: !Ref ProcessedWeatherBucket
  ApiUrl:
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  IngestFunctionName:
    Value: !Ref IngestLambda
